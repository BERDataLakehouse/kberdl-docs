site_name: "BER Data Lakehouse"
site_description: "Documentation for the KBase BER Data Lakehouse (K-BERDL) — a unified, AI-native data platform for DOE Biological and Environmental Research"
site_url: "https://docs.lakehouse.kbase.us/"

# Theme Configuration
theme:
  name: material
  # custom_dir: overrides # Removed as we moved files to docs/

  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
    - header.autohide

  logo: assets/kbase_lakehouse_logo.png
  favicon: assets/favicon.png

  font:
    text: Archivo
    code: Roboto Mono

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
  - stylesheets/fonts.css

# Navigation
nav:
  - About KBase Lakehouse: index.md
  - Architecture: architecture.md
  - Onboarding Guide: onboarding.md
  - Data Dictionary: data-dictionary.md
  - Tenant Model: tenant-model.md
  - Governance & Security: governance.md
  - MinIO / Data Plane: data-plane-minio.md
  - Microbial Discovery Forge: microbial-discovery-forge.md
  - Ingestion Guide: data-ingestion-guide.md
  - Roadmap: roadmap.md

# Plugins
plugins:
  - search
  - tags

markdown_extensions:
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
